name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            if [ ! -d /root/berlinr ]; then
              git clone https://github.com/karthikvengg/berlinr.git /root/berlinr
            fi
            cd /root/berlinr
            git pull origin main
            docker stop berlinr 2>/dev/null || true
            docker rm berlinr 2>/dev/null || true
            docker build -t berlinr .
            docker run -d -p 3000:80 --name berlinr berlinr
